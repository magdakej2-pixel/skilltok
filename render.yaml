# Render Blueprint — QUELIO Backend + Landing Page
# Deploy with: render.yaml in project root
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: quelio-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
